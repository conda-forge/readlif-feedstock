{% set name = "readlif" %}
{% set version = "0.6.6" %}

package:
  name: {{ name|lower }}
  version: {{ version }}

source:
  url: https://pypi.org/packages/source/{{ name[0] }}/{{ name }}/{{ name }}-{{ version }}.tar.gz
  sha256: 54620db7d9532afbff7fa2ba5f05d96b5b79d351213b91edd88d15145c7a6b4b


build:
  noarch: python
  number: 0
  script: {{ PYTHON }} -m pip install . -vv

requirements:
  host:
    - python >=3.6
    - pip
  run:
    - python >=3.6
    - Pillow

test:
  imports:
    - readlif
  requires:
    - pip
  commands:
    - pip check

about:
  home: https://github.com/nimne/readlif
  license: GPL-3.0-or-later
  license_family: GPL
  license_file: LICENSE
  summary: Fast Leica LIF file reader written in python
  doc_url: https://readlif.readthedocs.io/en/latest/
  dev_url: https://github.com/nimne/readlif

extra:
  recipe-maintainers:
    - keithchev
    - nimne
    - JacksonMaxfield
